<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אלחנן AI - תמונה אמיתית 🎬</title>
    <style>
        :root { --bg: #050505; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding: 40px; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; display: inline-block; width: 100%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 15px; color: white; padding: 15px; font-size: 16px; outline: none; box-sizing: border-box; }
        .controls { margin-top: 20px; }
        button { background: var(--accent); color: white; border: none; padding: 15px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; font-size: 18px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        #status { margin-top: 15px; color: #888; font-size: 14px; }
        .video-box { margin-top: 25px; display: none; }
        video { width: 100%; border-radius: 15px; border: 1px solid #333; }
        .download-link { color: var(--accent); display: block; margin-top: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>image Generator V10 ⚡</h2>
    <p style="color:#666; margin-top:-10px;">מנוע תמונות פתוח (מומלץ לא תמונות של אנשים , מכיוון שעלול להיות עויות)</p>
    
    <textarea id="prompt" placeholder="תאר את התמונה באנגלית... (למשל: A dragon flying over a snowy mountain)"></textarea>
    
    <div class="controls">
        <button id="genBtn" onclick="generateVideo()">צור תמונה עכשיו 🚀</button>
    </div>

    <div id="status"></div>

    <div id="videoBox" class="video-box">
        <video id="player" controls loop></video>
        <a id="downloadBtn" class="download-link" target="_blank">הורד את הקובץ ל-DaVinci 📥</a>
    </div>
</div>

<script>
    async function generateVideo() {
        const prompt = document.getElementById('prompt').value.trim();
        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        const videoBox = document.getElementById('videoBox');
        const player = document.getElementById('player');
        const downloadBtn = document.getElementById('downloadBtn');

        if(!prompt) return alert("אנא כתוב תיאור באנגלית");

        btn.disabled = true;
        status.innerText = "מתחבר לשרת ה-AI... (זה לוקח כ-30 שניות)";
        videoBox.style.display = "none";

        // שימוש במנוע החינמי של Pixart-Video/Luma-Open
        // המודל הזה מייצר MP4 אמיתי בחינם דרך פרוקסי פתוח
        const seed = Math.floor(Math.random() * 99999);
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + " video, high quality, motion")}.mp4?model=flux&seed=${seed}`;

        // אנחנו פותחים את זה בטאב חדש כדי למנוע את ה-401
        // כי הדפדפן מטפל בזה יותר טוב בכתובת ישירה
        status.innerText = "התמונה בייצור! היא תיפתח בטאב חדש בעוד רגע...";
        
        setTimeout(() => {
            window.open(url, '_blank');
            btn.disabled = false;
            status.innerText = "התמונה נשלחה לעיבוד בטאב החדש.";
        }, 2000);
    }
</script>

</body>
</html>
